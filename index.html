<header>
<h1 data-i18n="header-title">얼티밋 드림 트래블</h1>
<p data-i18n="header-subtitle">가상 포토 스튜디오 - 클릭 한 번으로 세계 여행!</p>
</header>

<!-- Virtual Studio Section -->
<section id="studio-section">
    <div class="studio-container">
        <h2 data-i18n="studio-title">📸 가상 포토 스튜디오</h2>
        <p><span data-i18n="studio-selected">선택된 여행지:</span> <strong id="selected-city-name">-</strong></p>
        
        <div id="composition-area" style="position: relative; width: 100%; max-width: 100%; height: auto; min-height: 300px; max-height: 60vh; background: #eee; border-radius: 15px; overflow: hidden; margin-top: 20px; background-size: cover; background-position: center; background-repeat: no-repeat; margin-left: auto; margin-right: auto; transition: aspect-ratio 0.3s;">
            <!-- User photo will be placed here -->
            <canvas id="user-canvas" style="position: absolute; bottom: 0; left: 50%; transform: translateX(-50%) scale(1); max-height: 95%; pointer-events: none; transition: transform 0.1s ease-out; filter: drop-shadow(0 0 2px rgba(0,0,0,0.1)); z-index: 2;"></canvas>
            
            <video id="webcam-video" autoplay playsinline style="display:none; position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; opacity: 0.6; z-index: 1;"></video>

            <div id="loading-overlay" style="display:none; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.8); align-items: center; justify-content: center; flex-direction: column; z-index: 10;">
                <div class="spinner"></div>
                <p style="margin-top: 10px; font-weight: 500;" data-i18n="studio-processing">배경 제거 중... (AI)</p>
            </div>
        </div>

        <!-- Adjust Controls -->
        <div id="adjust-controls" style="margin-top: 20px; display: none; background: #f9fafb; padding: 15px; border-radius: 12px; border: 1px solid #e5e7eb;">
            <div style="display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; align-items: center;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <label style="font-size: 14px; font-weight: 500;" data-i18n="ctrl-size">📏 크기:</label>
                    <input type="range" id="user-scale" min="0.1" max="2.0" step="0.05" value="1.0" oninput="updateUserTransform()" style="width: 80px;">
                </div>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <label style="font-size: 14px; font-weight: 500;" data-i18n="ctrl-horiz">↔️ 좌우:</label>
                    <input type="range" id="user-pos-x" min="0" max="100" step="1" value="50" oninput="updateUserTransform()" style="width: 80px;">
                </div>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <label style="font-size: 14px; font-weight: 500;" data-i18n="ctrl-vert">↕️ 상하:</label>
                    <input type="range" id="user-pos-y" min="-50" max="100" step="1" value="0" oninput="updateUserTransform()" style="width: 80px;">
                </div>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <label style="font-size: 14px; font-weight: 500;" data-i18n="ctrl-precision">✨ 정밀도:</label>
                    <input type="range" id="user-threshold" min="0.2" max="0.9" step="0.05" value="0.6" onchange="reprocessPhoto()" style="width: 80px;">
                </div>
                <button onclick="resetTransform()" style="padding: 5px 12px; background: #f3f4f6; border: 1px solid #d1d5db; border-radius: 6px; cursor: pointer; font-size: 13px;" data-i18n="btn-reset">초기화</button>
            </div>
        </div>

        <div style="margin-top: 25px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
            <button id="webcam-btn" onclick="toggleWebcam()" style="background: #ef4444; color: white; padding: 12px 24px; border-radius: 10px; border:none; cursor:pointer;" data-i18n="btn-webcam-on">📷 웹캠 사용</button>
            <button id="capture-btn" onclick="takeSnapshot()" style="display:none; background: #f59e0b; color: white; padding: 12px 24px; border-radius: 10px; border:none; cursor:pointer;" data-i18n="btn-capture">📸 찰칵!</button>
            
            <button onclick="document.getElementById('user-photo-upload').click()" style="background: #6366f1; color: white; padding: 12px 24px; border-radius: 10px; border:none; cursor:pointer;" data-i18n="btn-upload">👤 내 사진 업로드</button>
            <input type="file" id="user-photo-upload" accept="image/*" style="display:none" onchange="processUserPhoto(this)">
            
            <button id="download-comp-btn" onclick="captureComposition()" style="background: #10b981; color: white; padding: 12px 24px; border-radius: 10px; border:none; cursor:pointer; display:none;" data-i18n="btn-save">💾 사진 저장</button>
            <button onclick="closeStudio()" style="background: #6b7280; color: white; padding: 12px 24px; border-radius: 10px; border:none; cursor:pointer;" data-i18n="btn-exit">❌ 스튜디오 종료</button>
        </div>

        <p style="font-size: 12px; color: #666; margin-top: 15px;" data-i18n="studio-tip">* 인물 사진이 선명할수록 배경 제거 결과가 좋습니다.</p>
    </div>
</section>
