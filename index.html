<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Top 50 Bucket List Destinations</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: #f5f5f5;
      color: #222;
    }
    header {
      background: linear-gradient(135deg, #0066ff, #00c2b8);
      color: #fff;
      padding: 24px 16px;
      text-align: center;
      position: relative;
    }
    header h1 {
      margin: 0 0 8px;
      font-size: 1.8rem;
    }
    header p {
      margin: 0;
      font-size: 0.95rem;
      opacity: 0.9;
    }
    .visitor-counter {
      position: absolute;
      top: 12px;
      right: 16px;
      font-size: 0.85rem;
      font-weight: 500;
      background: rgba(255,255,255,0.2);
      padding: 4px 10px;
      border-radius: 20px;
    }
    main {
      max-width: 1200px;
      margin: 16px auto 32px;
      padding: 0 12px 32px;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
      align-items: center;
    }
    .controls label {
      font-size: 0.9rem;
    }
    .controls input {
      padding: 6px 8px;
      font-size: 0.9rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }
    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.16);
    }
    .thumb {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background: #000;
      overflow: hidden;
    }
    .thumb img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .play-button {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .card:hover .play-button {
      opacity: 1;
      cursor: pointer;
    }
    .play-button::before {
      content: '';
      width: 60px;
      height: 60px;
      background: rgba(255,255,255,0.9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-left: 4px;
    }
    .play-button::after {
      content: '▶';
      color: #0066ff;
      font-size: 28px;
      position: absolute;
    }
    .content {
      padding: 10px 12px 12px;
    }
    .rank {
      font-size: 0.8rem;
      font-weight: 600;
      color: #0066ff;
      margin-bottom: 4px;
    }
    .title {
      font-size: 1rem;
      font-weight: 600;
      margin: 0 0 4px;
    }
    .meta {
      font-size: 0.85rem;
      color: #555;
      margin: 0 0 6px;
    }
    .desc {
      font-size: 0.8rem;
      color: #666;
      margin: 0 0 8px;
    }
    .tag {
      display: inline-block;
      font-size: 0.75rem;
      padding: 2px 6px;
      border-radius: 999px;
      background: #eef3ff;
      color: #2645a3;
    }
    footer {
      text-align: center;
      font-size: 0.75rem;
      color: #777;
      padding: 12px 0 20px;
    }
    @media (max-width: 480px) {
      header h1 {
        font-size: 1.4rem;
      }
      .visitor-counter {
        top: 8px;
        right: 12px;
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="visitor-counter" id="visitorCounter">
      Visitors: <span id="visitorCount">0</span>
    </div>
    <h1>Top 50 Bucket List Destinations</h1>
    <p>Explore the world's most beautiful places with stunning photos and YouTube videos!</p>
  </header>

  <main>
    <section class="controls">
      <label for="search">Search (city/country/keyword):</label>
      <input id="search" type="text" placeholder="e.g. Paris, Maldives, Beach..." />
    </section>

    <section class="grid" id="placeGrid">
      <!-- Cards will be rendered by JavaScript -->
    </section>
  </main>

  <footer>
    ※ High-quality photos from YouTube thumbnails. Videos open in new tab.
  </footer>

  <script>
    // Complete 50 places array (from previous version)
    const places = [

      { rank: 10, name: "Amalfi Coast", country: "Italy", videoId: "YFhwEJosUsU", tag: "Coast / Drive" },
      { rank: 11, name: "Banff", country: "Canada", videoId: "YFhwEJosUsU", tag: "Lake / National Park" },
      { rank: 12, name: "Iceland Ring Road", country: "Iceland", videoId: "YFhwEJosUsU", tag: "Road Trip / Nature" },
      { rank: 13, name: "Machu Picchu", country: "Peru", videoId: "VJZSInO6F5M", tag: "Historic / Hiking" },
      { rank: 14, name: "Grand Canyon", country: "USA", videoId: "YFhwEJosUsU", tag: "Canyon / View" },

      { rank: 19, name: "Petra", country: "Jordan", videoId: "YFhwEJosUsU", tag: "Ancient / Desert" },
      { rank: 20, name: "Cinque Terre", country: "Italy", videoId: "YFhwEJosUsU", tag: "Coast / Village" },

      { rank: 22, name: "Ha Long Bay", country: "Vietnam", videoId: "YFhwEJosUsU", tag: "Bay / Cruise" },
      { rank: 23, name: "Patagonia", country: "Chile/Argentina", videoId: "YFhwEJosUsU", tag: "Trek / Glacier" },

      { rank: 30, name: "Jeju Island", country: "South Korea", videoId: "BwGvYGM6730", tag: "Island / Nature" },
      { rank: 31, name: "Lisbon", country: "Portugal", videoId: "YFhwEJosUsU", tag: "City / Tram" },
      { rank: 32, name: "Rio de Janeiro", country: "Brazil", videoId: "VJZSInO6F5M", tag: "Beach / City" },
      { rank: 33, name: "Cape Town", country: "South Africa", videoId: "YFhwEJosUsU", tag: "City / Mountain" },
      { rank: 34, name: "Dubrovnik", country: "Croatia", videoId: "VJZSInO6F5M", tag: "Old Town / Sea" },
      { rank: 35, name: "Hawaii (Oahu)", country: "USA", videoId: "VJZSInO6F5M", tag: "Beach / Surf" },

      { rank: 37, name: "Marrakesh", country: "Morocco", videoId: "VJZSInO6F5M", tag: "Market / Desert" },
      { rank: 38, name: "Queenstown", country: "New Zealand", videoId: "YFhwEJosUsU", tag: "Adventure / Lake" },
      { rank: 39, name: "Norwegian Fjords", country: "Norway", videoId: "YFhwEJosUsU", tag: "Fjord / Cruise" },
      { rank: 40, name: "Seychelles", country: "Seychelles", videoId: "YFhwEJosUsU", tag: "Island / Beach" },
      { rank: 41, name: "Taj Mahal", country: "India", videoId: "YFhwEJosUsU", tag: "Monument / Sunrise" },
      { rank: 42, name: "Angkor Wat", country: "Cambodia", videoId: "YFhwEJosUsU", tag: "Temple / Sunrise" },
      { rank: 43, name: "Niagara Falls", country: "Canada/USA", videoId: "VJZSInO6F5M", tag: "Waterfall" },
      { rank: 44, name: "Lake Bled", country: "Slovenia", videoId: "YFhwEJosUsU", tag: "Lake / Island" },
      { rank: 45, name: "Zermatt", country: "Switzerland", videoId: "YFhwEJosUsU", tag: "Ski / Mountain" },
      { rank: 46, name: "Lofoten Islands", country: "Norway", videoId: "YFhwEJosUsU", tag: "Island / Aurora" },
      { rank: 47, name: "Serengeti", country: "Tanzania", videoId: "YFhwEJosUsU", tag: "Safari / Nature" },
      { rank: 48, name: "Galápagos Islands", country: "Ecuador", videoId: "YFhwEJosUsU", tag: "Wildlife / Island" },
      { rank: 49, name: "Yosemite", country: "USA", videoId: "YFhwEJosUsU", tag: "National Park" },
      { rank: 50, name: "Zhangjiajie", country: "China", videoId: "YFhwEJosUsU", tag: "Mountain / Avatar" }
    ];

    const grid = document.getElementById("placeGrid");
    const searchInput = document.getElementById("search");
    const visitorCountEl = document.getElementById("visitorCount");

    // Visitor counter (localStorage)
    function updateVisitorCount() {
      let count = parseInt(localStorage.getItem('visitorCount') || '0') + 1;
      localStorage.setItem('visitorCount', count);
      visitorCountEl.textContent = count.toLocaleString();
    }
    updateVisitorCount();

    function render(list) {
      grid.innerHTML = "";
      list.forEach(place => {
        const card = document.createElement("article");
        card.className = "card";
        card.innerHTML = `
          <div class="thumb">
            <img src="https://img.youtube.com/vi/${place.videoId}/maxresdefault.jpg" alt="${place.name} high quality photo" loading="lazy" />
            <div class="play-button" data-video-id="${place.videoId}"></div>
          </div>
          <div class="content">
            <div class="rank">#${place.rank}</div>
            <h2 class="title">${place.name}</h2>
            <p class="meta">${place.country}</p>
            <p class="desc">Must-visit destination for every travel bucket list.</p>
            <span class="tag">${place.tag}</span>
          </div>
        `;
        grid.appendChild(card);
      });
      
      // Play button events
      document.querySelectorAll('.play-button').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const videoId = e.currentTarget.dataset.videoId;
          window.open(`https://www.youtube.com/watch?v=${videoId}`, '_blank');
        });
      });
    }

    function handleSearch() {
      const q = searchInput.value.trim().toLowerCase();
      if (!q) {
        render(places);
        return;
      }
      const filtered = places.filter(p =>
        p.name.toLowerCase().includes(q) ||
        p.country.toLowerCase().includes(q) ||
        (p.tag && p.tag.toLowerCase().includes(q))
      );
      render(filtered);
    }

    searchInput.addEventListener("input", handleSearch);

    // Initial render
    render(places);
  </script>
</body>
</html>
