<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>세계 여행 추천 사이트</title>

<style>

body{
    font-family: Arial;
    margin:0;
    background:#f0f0f0;
}

header{
    background:#1e88e5;
    color:white;
    text-align:center;
    padding:30px;
}

h1{
    margin:0;
}

.container{
    width:1000px;
    margin:auto;
    margin-top:30px;
}

.cards{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
}

.card{
    width:300px;
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card-content{
    padding:20px;
}

button{
    padding:10px 20px;
    background:#1e88e5;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#1565c0;
}

.random-box{
    text-align:center;
    margin:40px;
}

footer{
    background:#333;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:40px;
}

</style>

</head>

<body>

<header>
<h1>🌍 세계 여행 TOP 5</h1>
<p>세계에서 가장 가보고 싶은 여행지</p>
</header>

<div class="random-box">
<button onclick="recommend()">🎲 랜덤 여행지 추천</button>
<h2 id="result"></h2>
</div>

<div class="container">

<div class="cards">

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/a/a8/Tour_Eiffel_Wikimedia_Commons.jpg">
<div class="card-content">
<h3>프랑스 파리</h3>
<p>에펠탑과 낭만적인 분위기로 유명한 세계적인 관광 도시입니다.</p>
<button onclick="window.open('https://www.youtube.com/results?search_query=paris+travel')">여행 영상 보기</button>
</div>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6e/Shibuya_Crossing%2C_Tokyo.jpg">
<div class="card-content">
<h3>일본 도쿄</h3>
<p>첨단 도시와 전통 문화가 공존하는 매력적인 여행지입니다.</p>
<button onclick="window.open('https://www.youtube.com/results?search_query=tokyo+travel')">여행 영상 보기</button>
</div>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/d/dd/Manhattan_Skyline_2009.jpg">
<div class="card-content">
<h3>미국 뉴욕</h3>
<p>세계 경제와 문화의 중심지이며 화려한 도시 풍경이 유명합니다.</p>
<button onclick="window.open('https://www.youtube.com/results?search_query=new+york+travel')">여행 영상 보기</button>
</div>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/0e/Colosseum_in_Rome%2C_Italy_-_April_2007.jpg">
<div class="card-content">
<h3>이탈리아 로마</h3>
<p>고대 로마 유적과 예술이 가득한 역사적인 도시입니다.</p>
<button onclick="window.open('https://www.youtube.com/results?search_query=rome+travel')">여행 영상 보기</button>
</div>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/e/e3/Great_Wall_of_China_July_2006.JPG">
<div class="card-content">
<h3>중국 만리장성</h3>
<p>세계에서 가장 유명한 역사적 건축물 중 하나입니다.</p>
<button onclick="window.open('https://www.youtube.com/results?search_query=great+wall+travel')">여행 영상 보기</button>
</div>
</div>

</div>

</div>

<footer>
<p>© 2026 세계 여행 추천 사이트</p>
</footer>

<script>

function recommend(){

let places=[
"🇫🇷 파리",
"🇯🇵 도쿄",
"🇺🇸 뉴욕",
"🇮🇹 로마",
"🇨🇳 만리장성"
];

let random=places[Math.floor(Math.random()*places.length)];

document.getElementById("result").innerText="추천 여행지: "+random;

}

</script>

</body>
</html>
