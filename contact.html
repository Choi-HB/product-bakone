<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

     crossorigin="anonymous"></script>
<title>Contact Us - Ultimate Dream Travel</title>
<meta name="description" content="Get in touch with Ultimate Dream Travel for partnership inquiries, business proposals, or travel-related questions.">

<!-- Open Graph / Facebook -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://product-bakone.pages.dev/contact.html">
<meta property="og:title" content="Contact Us - Ultimate Dream Travel">
<meta property="og:description" content="Get in touch with Ultimate Dream Travel for partnership inquiries or questions.">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
    .content-page {
        max-width: 800px;
        margin: 50px auto;
        padding: 40px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
    .content-page h1 { margin-top: 0; }
    .contact-form { margin-top: 30px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
    .form-group input, .form-group textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-family: inherit;
    }
    .submit-btn {
        background: #2563eb;
        color: white;
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        transition: background 0.3s;
    }
    .submit-btn:hover { background: #1e40af; }
</style>
</head>
<body>

<nav>
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="contact.html">Contact Us</a>
    <a href="privacy.html">Privacy Policy</a>
</nav>

<header>
    <div style="text-align: center; padding: 20px; background: #f8fafc;">
        <h1>Contact Us</h1>
    </div>
</header>

<main>
    <section class="content-page">
        <p>We'd love to partner with you! If you have any business proposals or partnership inquiries, please fill out the form below.</p>
        
        <div class="contact-form">
            <form action="https://formspree.io/f/mkopwvag" method="POST">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <label for="email">Your Email</label>
                    <input type="email" id="email" name="email" placeholder="Your Email Address" required>
                </div>
                <div class="form-group">
                    <label for="message">Message (Proposal)</label>
                    <textarea id="message" name="message" rows="5" placeholder="Please describe your partnership proposal" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Partnership Inquiry</button>
            </form>
        </div>
    </section>
</main>

<footer>
    <div class="policy-links">
        <a href="index.html">Home</a> |
        <a href="about.html">About Us</a> |
        <a href="contact.html">Contact Us</a> |
        <a href="privacy.html">Privacy Policy</a> |
        <a href="terms.html">Terms of Service</a>
    </div>
    <p>© 2026 Ultimate Dream Travel. All rights reserved.</p>
</footer>

</body>
</html>
